name: Close stale PRs
on:
  schedule:
    - cron: '0 1 * * *'
jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-message: 'No activity here for 14 days. If you are still working on this, just leave a comment and it stays open - otherwise it will be closed in 7 days.'
          close-pr-message: 'Closing due to inactivity. Feel free to reopen if you want to pick this back up; the review notes above still apply.'
          stale-pr-label: 'stale'
          days-before-issue-stale: -1
