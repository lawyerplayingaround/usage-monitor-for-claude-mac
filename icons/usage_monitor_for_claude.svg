<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="1024" height="1024" role="img">
  <title>Usage Monitor for Claude app icon</title>
  <desc>Rounded-square gradient app icon with a coin and dual progress arcs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
    <clipPath id="coinClip">
      <circle cx="120.0" cy="120.0" r="66.0"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="240" height="240" rx="54" fill="url(#bg)"/>

  <circle cx="92" cy="108" r="58" fill="#ffffff" opacity="0.16"/>
  <circle cx="152" cy="160" r="78" fill="#ffffff" opacity="0.10"/>

  <circle cx="120.0" cy="120.0" r="66.0" fill="url(#coin)"/>
  <circle cx="120.0" cy="120.0" r="66.0" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>

  <g clip-path="url(#coinClip)" fill="none" stroke-linecap="round">
    <!-- Outer arc: pale track (rounded caps at LL + LR) then saturated fill (rounded caps at LL + mid-arc end).
         The fill's LL cap overlays the track's pale LL cap → reads as saturated at LL.
         The track's LR pale cap remains visible.  The fill's mid-arc cap stands proud of the track. -->
    <path d="M 82.523 157.477 A 53.0 53.0 0 1 1 157.477 157.477"
          stroke="#c7d2fe" stroke-width="13.0"/>
    <path d="M 82.523 157.477 A 53.0 53.0 0 1 1 172.347 111.709"
          stroke="#4338ca" stroke-width="13.0"/>

    <path d="M 98.787 141.213 A 30.0 30.0 0 1 1 141.213 141.213"
          stroke="#cffafe" stroke-width="11.0"/>
    <path d="M 98.787 141.213 A 30.0 30.0 0 0 1 124.227 90.299"
          stroke="#0891b2" stroke-width="11.0"/>
  </g>
</svg>
